backend:
  name: github
  repo: fauteuilbleu-art/notresteuph
  branch: main
  auth_type: pkce
  app_id: Ov23liAm17iU0bQVNi8b

media_folder: "images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - label: "Accueil"
        name: "index"
        file: "index.html"
        fields:
          - { label: "Titre", name: "title", widget: "string" }

  - name: "fiches"
    label: "Fiches village"
    folder: "fiches"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nom", name: "title", widget: "string" }
      - { label: "Rue", name: "rue", widget: "string" }
      - { label: "Texte", name: "body", widget: "markdown" }
      - { label: "Photo", name: "photo", widget: "image", required: false }
